<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal Manager</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app-root">
  <div id="app">
    <!-- ─── Sidebar ─────────────────────────────── -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <div class="sidebar-title">
          <span class="sidebar-icon">⚡</span>
          <h1>Terminal Manager</h1>
        </div>
        <button id="sidebar-sort-btn" type="button" title="Sort sidebar" aria-label="Sort sidebar">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
            <path d="M3 4h9M5 7.5h7M7 11h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M2.5 11.5V3.5M2.5 11.5L1 10M2.5 11.5L4 10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div id="sidebar-content">
        <div id="folder-list">
          <!-- Folder groups rendered here by sidebar.js -->
        </div>
      </div>

      <div id="sidebar-footer">
        <button id="add-folder-btn" title="Add Folder">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>Add Folder</span>
        </button>
      </div>
    </aside>

    <!-- ─── Resize Handle ───────────────────────── -->
    <div id="sidebar-resize-handle"></div>

    <!-- ─── Main Content ────────────────────────── -->
    <main id="main-content">
      <!-- Terminal Header (shown when a terminal is active) -->
      <div id="terminal-header" class="hidden">
        <div id="terminal-breadcrumb">
          <span id="breadcrumb-folder"></span>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span id="breadcrumb-terminal"></span>
        </div>
        <!-- Workspace actions -->
        <div id="view-tabs" class="hidden">
          <button class="view-tab icon-only active" id="changes-btn" type="button" data-view="changes" title="Changes" aria-label="Changes">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M4 2v10M10 2v10M1 5h6M7 9h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="view-tab icon-only" id="files-btn" type="button" data-view="files" title="Files" aria-label="Files">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2.5 3.25h3l1.2 1.2h4.8a1 1 0 011 1v5.05a1 1 0 01-1 1H2.5a1 1 0 01-1-1V4.25a1 1 0 011-1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
              <path d="M1.7 5.5h10.6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Terminal Search Bar (shown on Cmd+F) -->
      <div id="terminal-search-bar" class="hidden">
        <div id="terminal-search-inner">
          <input id="terminal-search-input" type="text" placeholder="Find in terminal…" autocomplete="off" spellcheck="false" />
          <span id="terminal-search-count"></span>
          <button id="terminal-search-prev" title="Previous (Shift+Enter)">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M9 7.5L6 4.5 3 7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="terminal-search-next" title="Next (Enter)">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M3 4.5L6 7.5 9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <label id="terminal-search-case" title="Match case" class="search-toggle">
            <input type="checkbox" id="terminal-search-case-cb" />
            <span>Aa</span>
          </label>
          <label id="terminal-search-regex-label" title="Use regex" class="search-toggle">
            <input type="checkbox" id="terminal-search-regex-cb" />
            <span>.*</span>
          </label>
          <button id="terminal-search-close" title="Close (Esc)">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>

      <div id="workspace-row">
        <!-- Terminal Container -->
        <div id="terminal-container">
          <!-- xterm.js instances rendered here -->
        </div>

        <!-- Right Drawer -->
        <div id="right-drawer" class="hidden">
          <div id="right-drawer-resize-handle"></div>
          <div id="right-drawer-header">
            <div class="right-drawer-heading">
              <span id="right-drawer-title">Changes</span>
              <span id="right-drawer-folder"></span>
            </div>
          </div>
          <div id="right-drawer-content">
            <!-- Diff Viewer Container -->
            <div id="diff-container" class="hidden">
              <!-- Changed files list + Monaco diff editor -->
              <div id="diff-file-list">
                <div id="diff-file-list-header">
                  <span>Local Changes</span>
                  <button id="diff-refresh-btn" title="Refresh">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                      <path d="M11.5 2.5v3.5h-3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                      <path d="M2.5 11.5v-3.5h3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                      <path d="M3.5 5a4.5 4.5 0 017.4-1.5M10.5 9a4.5 4.5 0 01-7.4 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                    </svg>
                  </button>
                </div>
                <div id="diff-file-items">
                  <!-- File items rendered here -->
                </div>
              </div>
              <div id="diff-editor-container">
                <!-- Diff toolbar (visible once a file is selected) -->
                <div id="diff-toolbar" class="hidden">
                  <div class="diff-toolbar-group">
                    <button id="diff-toggle-collapse" class="diff-toolbar-btn active" title="Collapse unchanged lines">
                      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M2 4h10M2 7h6M2 10h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                        <path d="M10 8l2-2-2-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                      </svg>
                      <span>Collapse Unchanged</span>
                    </button>
                  </div>
                  <div class="diff-toolbar-group">
                    <button id="diff-toggle-side-by-side" class="diff-toolbar-btn active" title="Toggle split / inline view">
                      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <rect x="1" y="2" width="5" height="10" rx="1" stroke="currentColor" stroke-width="1.2"/>
                        <rect x="8" y="2" width="5" height="10" rx="1" stroke="currentColor" stroke-width="1.2"/>
                      </svg>
                      <span>Split</span>
                    </button>
                    <button id="diff-toggle-markdown-preview" class="diff-toolbar-btn hidden" title="Toggle markdown preview">
                      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M2.5 2.5h9v9h-9z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
                        <path d="M4 5.25h6M4 7h4M4 8.75h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                      </svg>
                      <span>Preview</span>
                    </button>
                  </div>
                </div>
                <div id="diff-empty-state">
                  <div class="empty-state-icon" style="animation: none;">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                      <path d="M16 8v32M32 8v32M8 20h16M24 28h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
                    </svg>
                  </div>
                  <p>Select a file to view changes</p>
                </div>
                <div id="diff-editor-wrapper" class="hidden">
                  <!-- Monaco diff editor mounts here -->
                </div>
                <div id="diff-markdown-preview" class="hidden"></div>
              </div>
            </div>

            <!-- Files Container -->
            <div id="files-container" class="hidden">
              <div id="files-header">
                <div class="files-header-copy">
                  <span class="files-header-title">Project Files</span>
                  <span id="files-folder-label"></span>
                </div>
                <button id="files-refresh-btn" type="button" title="Refresh">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M11.5 2.5v3.5h-3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2.5 11.5v-3.5h3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M3.5 5a4.5 4.5 0 017.4-1.5M10.5 9a4.5 4.5 0 01-7.4 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                  </svg>
                </button>
              </div>
              <div id="files-body">
                <div id="files-tree-pane">
                  <div id="files-tree"></div>
                  <div id="files-empty-state" class="hidden">
                    <div class="empty-state-icon" style="animation: none;">
                      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                        <path d="M14 17h20M14 24h20M14 31h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
                        <rect x="9" y="10" width="30" height="28" rx="4" stroke="currentColor" stroke-width="2" opacity="0.25"/>
                      </svg>
                    </div>
                    <p>No files found</p>
                  </div>
                </div>
                <div id="files-tree-resize-handle" aria-hidden="true"></div>
                <div id="files-preview-pane">
                  <div id="files-preview-empty-state">
                    Select a file to preview
                  </div>
                  <div id="files-preview-loading" class="hidden"></div>
                  <div id="files-preview-error" class="hidden"></div>
                  <div id="files-preview-header" class="hidden">
                    <div id="files-preview-name"></div>
                    <div id="files-preview-path"></div>
                  </div>
                  <div id="files-preview-markdown" class="hidden"></div>
                  <div id="files-preview-editor" class="hidden"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div id="empty-state">
        <div class="empty-state-content">
          <div class="empty-state-icon">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
              <rect x="8" y="12" width="48" height="40" rx="4" stroke="currentColor" stroke-width="2" opacity="0.3"/>
              <path d="M20 32l6 6 12-12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
              <path d="M16 20h32" stroke="currentColor" stroke-width="2" opacity="0.2"/>
            </svg>
          </div>
          <h2>No Terminal Selected</h2>
          <p>Add a folder and create a terminal to get started</p>
          <button id="empty-add-folder-btn" class="empty-action-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Add Folder
          </button>
        </div>
      </div>
    </main>
  </div>

  </div><!-- /#app-root -->

  <!-- Monaco Editor AMD Loader -->
  <script>
    // Configure Monaco AMD loader before bundle loads
    window.monacoReady = new Promise((resolve) => {
      const loaderScript = document.createElement('script');
      loaderScript.src = '../node_modules/monaco-editor/min/vs/loader.js';
      loaderScript.onload = () => {
        require.config({
          paths: { vs: '../node_modules/monaco-editor/min/vs' }
        });
        require(['vs/editor/editor.main'], function(monaco) {
          window.monaco = monaco;
          resolve(monaco);
        });
      };
      document.head.appendChild(loaderScript);
    });
  </script>

  <script src="bundle.js"></script>
</body>
</html>
